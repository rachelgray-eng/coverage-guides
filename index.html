<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coverage Guides</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #202124;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 2rem; }
    ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 480px; }
    li a {
      display: block;
      padding: 1rem 1.25rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      text-decoration: none;
      transition: box-shadow 0.15s;
    }
    li a:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .name {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--accent);
    }
    .role {
      font-size: 0.85rem;
      color: #5f6368;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h1>Coverage Guides</h1>
<ul>
    <li style="--accent: #7c3aed;">
      <a href="coverage-brad.html">
        <div class="name">Brad Axen</div>
        <div class="role">AiDA (AI &amp; Data Analytics) Tech Lead · Engineering</div>
      </a>
    </li>
    <li style="--accent: #1a73e8;">
      <a href="coverage-dino.html">
        <div class="name">Dino Dai Zovi</div>
        <div class="role">Applied Security Engineering (BASE) Lead</div>
      </a>
    </li>
    <li style="--accent: #0d9488;">
      <a href="coverage-randy.html">
        <div class="name">Randy Wigginton</div>
        <div class="role">Leading the Reliability Organization</div>
      </a>
    </li>
  </ul>
<script>
(function() {
  const HASH = '3ee4311d9b895c3ac542b151a149e074834bcbf5f478f4498a13d5689ff08f54';
  const KEY = 'cg_auth';
  if (sessionStorage.getItem(KEY) === HASH) return;
  document.body.style.visibility = 'hidden';
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:#f8f9fa;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;';
  overlay.innerHTML = `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:2rem 2.5rem;width:100%;max-width:360px;text-align:center;"><div style="font-size:1.4rem;font-weight:600;margin-bottom:0.25rem;color:#202124;">Coverage Guides</div><div style="font-size:0.85rem;color:#5f6368;margin-bottom:1.5rem;">Enter the team password to continue</div><input id="cg-pw" type="password" placeholder="Password" style="width:100%;padding:0.6rem 0.75rem;border:1px solid #e0e0e0;border-radius:6px;font-size:1rem;outline:none;margin-bottom:0.75rem;" /><div id="cg-err" style="color:#d93025;font-size:0.8rem;min-height:1rem;margin-bottom:0.5rem;"></div><button id="cg-btn" style="width:100%;padding:0.65rem;background:#202124;color:#fff;border:none;border-radius:6px;font-size:1rem;cursor:pointer;">Continue</button></div>`;
  document.body.appendChild(overlay);
  document.body.style.visibility = '';
  async function attempt() {
    const val = document.getElementById('cg-pw').value;
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex === HASH) { sessionStorage.setItem(KEY, HASH); overlay.remove(); }
    else { document.getElementById('cg-err').textContent = 'Incorrect password.'; document.getElementById('cg-pw').value = ''; document.getElementById('cg-pw').focus(); }
  }
  document.getElementById('cg-btn').addEventListener('click', attempt);
  document.getElementById('cg-pw').addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  setTimeout(() => document.getElementById('cg-pw').focus(), 50);
})();
</script>
</body>
</html>
